settings:
  lobby-world: 'lobby'
  survival-world: 'world'
  compass-slot: 4
  force-slot: true
  give-on-join-delay-ticks: 20
  give-on-world-change-delay-ticks: 8
  update-task-enabled: true
  update-task-ticks: 40

messages:
  prefix: '&6◆ &e&lMSURVIVAL &8» &r'
  reloaded: '&aPrzeladowano kompas.'
  fixed: '&aNaprawiono kompas w ekwipunku.'
  only-player: '&cTa komenda jest tylko dla gracza.'
  no-permission: '&cNie masz uprawnien.'
  not-in-lobby: '&cKompas dziala tylko w lobby.'

compass:
  material: COMPASS
  name: '&6◆ &e&lMSURVIVAL &7» &fMenu'
  lore:
    - '&7Kliknij, aby otworzyc menu serwera.'
    - ''
    - '&eSurvival &8| &aKlucze &8| &dE-Kity &8| &2Rynek'
    - '&7» &fWszystko w jednym miejscu.'
  enchanted: false

cleanup:
  enabled: true
  remove-on-non-lobby: true
  remove-extra-compasses: true
  # Usuwa tez stare kompasy menu bez PDC, jesli maja podobna nazwe.
  remove-old-menu-compasses-by-name: true
  old-name-contains:
    - 'MSURVIVAL'
    - 'Menu'
    - 'Kompas'

menu:
  size: 27
  title: '&6◆ &e&lMSURVIVAL &7» &fMENU'
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE
    name: '&8'
  items:
    survival:
      slot: 10
      material: GRASS_BLOCK
      name: '&e&lSURVIVAL'
      lore:
        - '&7» &fKliknij, aby wejsc na tryb.'
        - '&7» &fSwiat: &eworld'
        - ''
        - '&aKliknij, aby teleportowac.'
      command: 'mvtp world'
      close: true
      sound: 'ENTITY_ENDERMAN_TELEPORT'
    keys:
      slot: 12
      material: TRIPWIRE_HOOK
      name: '&a&lKLUCZE'
      lore:
        - '&7» &fOtworz menu kluczy.'
        - '&7» &fDaily, weekly i klucze premium.'
        - ''
        - '&aKliknij, aby otworzyc.'
      command: 'keysmenu'
      close: true
      sound: 'BLOCK_NOTE_BLOCK_PLING'
    kits:
      slot: 14
      material: NETHERITE_CHESTPLATE
      name: '&d&lE-KITY'
      lore:
        - '&7» &fZobacz dostepne e-kity.'
        - '&7» &fKlasyczny, Epic, Boski i wiecej.'
        - ''
        - '&aKliknij, aby otworzyc.'
      command: 'kits'
      close: true
      sound: 'ITEM_ARMOR_EQUIP_DIAMOND'
    market:
