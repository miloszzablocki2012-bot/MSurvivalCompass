        - '&7» &fKupuj i sprzedawaj itemy.'
        - '&7» &fSprawdz klucze i oferty.'
        - ''
        - '&aKliknij, aby otworzyc.'
      command: 'rynek'
      close: true
      sound: 'ENTITY_EXPERIENCE_ORB_PICKUP'
    lobby:
      slot: 22
      material: END_CRYSTAL
      name: '&b&lLOBBY'
      lore:
        - '&7» &fWroc na lobby serwera.'
        - '&7» &fOsobny ekwipunek lobby.'
        - ''
        - '&aKliknij, aby teleportowac.'
