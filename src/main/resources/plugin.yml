name: MSurvivalCompass
version: 1.0.0
main: pl.msurvival.compass.MSurvivalCompassPlugin
api-version: '1.21'
author: Milekz / ChatGPT
description: Custom MSurvival lobby compass menu.
softdepend:
  - Multiverse-Core
  - MSurvivalLobby
  - MSurvivalKeys
  - MSurvivalMarket
commands:
  menu:
    description: Otwiera menu MSurvival.
    aliases: [kompas, compass, mscompass]
  compassreload:
    description: Przeladowuje MSurvivalCompass.
    permission: msurvivalcompass.admin
  compassfix:
    description: Czysci i daje kompas menu.
    permission: msurvivalcompass.admin
permissions:
  msurvivalcompass.admin:
    default: op
