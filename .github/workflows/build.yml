name: Build MSurvivalCompass

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'MSurvivalCompass/**'
      - '.github/workflows/build-compass.yml'

jobs:
  build:
    name: Build MSurvivalCompass Java 25
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build MSurvivalCompass
        run: |
          cd MSurvivalCompass
          mvn clean package -DskipTests

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp MSurvivalCompass/target/*.jar output/MSurvivalCompass.jar

      - name: Upload Compass JAR
        uses: actions/upload-artifact@v4
        with:
          name: MSurvivalCompass-Java25
          path: output/MSurvivalCompass.jar
