name: Build MSurvival plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Java 25 JARs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build MSurvivalKeys
        run: |
          cd MSurvivalKeys
          mvn clean package -DskipTests

      - name: Build MSurvivalCompass
        run: |
          cd MSurvivalCompass
          mvn clean package -DskipTests

      - name: Prepare artifacts
        run: |
          mkdir -p output
          cp MSurvivalKeys/target/*.jar output/MSurvivalKeys.jar
          cp MSurvivalCompass/target/*.jar output/MSurvivalCompass.jar

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: MSurvival-Java25-JARs
          path: output/*.jar
