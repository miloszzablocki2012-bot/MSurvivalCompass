name: Build MSurvivalCompass

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Compass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Show files
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== COMPASS FILES ==="
          ls -la MSurvivalCompass || true

      - name: Check Compass folder
        run: |
          if [ ! -f "MSurvivalCompass/pom.xml" ]; then
            echo "ERROR: Nie znaleziono MSurvivalCompass/pom.xml"
            echo "Folder musi wyglądać tak:"
            echo "MSurvivalCompass/pom.xml"
            echo "MSurvivalCompass/src/main/java/..."
            exit 1
          fi

      - name: Build MSurvivalCompass
        run: |
          cd MSurvivalCompass
          mvn -B clean package -DskipTests

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp MSurvivalCompass/target/*.jar output/MSurvivalCompass.jar

      - name: Upload Compass JAR
        uses: actions/upload-artifact@v4
        with:
          name: MSurvivalCompass-Java25
          path: output/MSurvivalCompass.jar
